    <style>
        .envelopes-wrapper {
            opacity: 0;
            pointer-events: none;
        }
        body:not(.container) .envelopes-wrapper {
            animation: fadeInEnvelopes 1.5s ease forwards;
            animation-delay: 6s;
        }
        @keyframes fadeInEnvelopes {
            0% { opacity: 0; pointer-events: none; }
            100% { opacity: 1; pointer-events: auto; }
        }

        .envelope {
            position: absolute;
            cursor: pointer;
            z-index: 100;
            animation: float 3s ease-in-out infinite alternate;
            transition: transform 0.2s;
        }
        .envelope:hover { 
            transform: rotate(var(--rot)) scale(1.2); 
            animation-play-state: paused; 
        }
        @keyframes float {
            0% { transform: rotate(var(--rot)) translateY(0); }
            100% { transform: rotate(var(--rot)) translateY(-15px); }
        }

        .click-instruction {
            position: absolute;
            top: 10%;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            font-family: 'Caveat', cursive;
            font-size: clamp(40px, 8vw, 55px);
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 100;
        }

        .env1 { top: 12%; left: 8%; animation-delay: 0s; --rot: -15deg; font-size: 60px; }
        .env2 { top: 18%; left: 78%; animation-delay: 0.5s; --rot: 20deg; font-size: 55px; }
        .env3 { top: 25%; left: 42%; animation-delay: 1.2s; --rot: 5deg; font-size: 65px; }
        .env4 { top: 35%; left: 12%; animation-delay: 0.8s; --rot: -25deg; font-size: 50px; }
        .env5 { top: 45%; left: 85%; animation-delay: 1.5s; --rot: 15deg; font-size: 60px; }
        .env6 { top: 28%; left: 65%; animation-delay: 0.2s; --rot: -10deg; font-size: 55px; }
        .env7 { top: 55%; left: 15%; animation-delay: 2.0s; --rot: 25deg; font-size: 65px; }
        .env8 { top: 65%; left: 80%; animation-delay: 1.1s; --rot: -5deg; font-size: 50px; }
        .env9 { top: 40%; left: 28%; animation-delay: 0.7s; --rot: 10deg; font-size: 58px; }
        .env10 { top: 50%; left: 68%; animation-delay: 1.8s; --rot: -20deg; font-size: 62px; }

        #letter-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .letter-content {
            background: #fff;
            color: #333;
            padding: 40px 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 30px;
            cursor: pointer;
            color: #888;
        }
        .close-btn:hover { color: #d9534f; }

        @media (max-width: 768px) {
            .env3 { font-size: 50px; }
            .env4 { font-size: 38px; }
            .env5 { font-size: 45px; }
            .env6 { font-size: 42px; }
            .env7 { font-size: 50px; }
            .env8 { font-size: 38px; }
            .env9 { font-size: 42px; }
            .letter-content { padding: 30px 20px; }
        }
    </style>

    <div class="envelopes-wrapper">
        <div class="click-instruction">Happy Mother's Day, Mama!</div>
        <div class="envelope env4" onclick="showLetter('Dear ma, thank you so much, for being there with us ni maddox and especially kai andrew. Even thou im not there  youre always taking care of my son. And usahay naay times nga walang wala ko or mag sakit imong mga apo, ikaw rjud akong madoolan ma, and ur always there to help us.  Hoping that youre happy on this day.  And thank you pud pag stand as a 2nd mom of andrew. Thank you so much ma. Youre the best. I love you so much. Mwuahhh. 😘\n\n-Chandy')">✉️</div>
        <div class="envelope env7" onclick="showLetter('Happy Mother’s Day, Mama! 💖\n\nThank you for your endless love, care, and sacrifices. I’m so lucky to have you.Love you always!\n\n-Meng')">✉️</div>
        <div class="envelope env9" onclick="showLetter('As we\'ve grown older, we\'ve come to realize how much effort you\'ve poured into us, shaping us into who we are today. From waking up early to prepare our breakfast before school to laying out our clothes as we left the house to chase our dreams, you allowed us the freedom to discover what we truly aspire to in life. There was never a glimpse of doubt as each of us took different roads to our different endeavors. It is our profound honor to celebrate the woman who raised us to be strong and courageous.\n\nHappy Mother\'s Day, Ma. We are truly grateful for your life.\n\n-Sarah')">✉️</div>
        <div class="envelope env3" onclick="showLetter('Happy Mother\'s Day, Mama! The best mama in the world! Thank you sa everything, Ma sa mga sakripsyo ug love nimo sa amoa. Dili gyud lalim imong kaagi ma pero salamat kaayo kay nagpalig-on gyud ka para sa amoa. Ampo lang ta kanunay , Ma nanrabaho gyud kog tarong kay daghan pa ta mga pangandoy. Sorry kaayo kay daghan mga okasyon na wala ko isa naning Mother\'s Day, layo man ko pero nabati gihapon nako imong pag pang-a tho mas bulahan gyud akong mga igsoon hahaha. Blessed kaayo mi, Ma kay ikaw gyud amoang na inahan , wa gyuy makalupig sa imong pagka super mom! Salamat sobra, Mama! Be healthy and happy always! Love you, Ma ♥️\n\n-Aya')">✉️</div>
        <div class="envelope env6" onclick="showLetter('Hi ma! I\'m not really expressive but I hope you know how much I care and treasure you always. I know I can be hard-headed sometimes and yet you still manage to help me. Times when I feel sadness, you are always there to listen to my problem, which helps me a lot. You are the strongest woman I have ever known and will always be. Although there was a time that I was depress, you were still there and tolerated me. Thank you mama :>\n\n-Shayne')">✉️</div>
        <div class="envelope env8" onclick="showLetter('img/madot.jpg')">✉️</div>
        <div class="envelope env5" onclick="showLetter('img/andrew.jpg')">✉️</div>
    </div>
